name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: bash scripts/build-dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/2fa-${{ steps.version.outputs.VERSION }}.dmg
          generate_release_notes: true
